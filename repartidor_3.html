<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reparto del día</title>
<style>
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2e2e2e;
  --text:#f0ede8;
  --text2:#888;
  --accent:#e74c3c;
  --green:#2ecc71;
  --blue:#3498db;
  --mono:'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --c-pollo:#5dade2;
  --c-cong:#58d68d;
  --c-huevo:#f0b27a;
  --c-var:#c39bd3;
  --c-kg:#f1948a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}

/* SPLASH */
#splash{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .4s;
}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-size:2.8rem;margin-bottom:.5rem;}
.splash-title{font-family:var(--mono);font-size:.85rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text2);margin-bottom:2rem;}
.splash-bar{width:160px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.splash-progress{height:100%;background:var(--accent);width:0;transition:width .6s ease;}

/* HEADER */
.app-header{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.75rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
}
.header-left{display:flex;flex-direction:column;gap:.15rem;}
.header-title{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text2);}
.header-fecha{font-size:1rem;font-weight:600;letter-spacing:-.01em;}
.header-badge{
  background:var(--accent);color:#fff;
  font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;
  padding:.25rem .6rem;border-radius:2px;
}

/* FILTRO REPARTOS */
.filtro-wrap{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.5rem .75rem;overflow-x:auto;
  display:flex;gap:.4rem;align-items:center;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filtro-wrap::-webkit-scrollbar{display:none;}
.filtro-btn{
  flex-shrink:0;
  padding:.38rem .85rem;
  border:1px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;border-radius:2px;transition:all .15s;
  white-space:nowrap;
}
.filtro-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.filtro-btn.active-ARIEL{background:#1a5276;color:#fff;border-color:#1a5276;}
.filtro-btn.active-GABRIEL{background:#512e5f;color:#fff;border-color:#512e5f;}
.filtro-btn.active-MARTIN{background:#0e6655;color:#fff;border-color:#0e6655;}
.filtro-btn.active-FEDERICO{background:#784212;color:#fff;border-color:#784212;}
.filtro-btn.active-DEPOSITO{background:#2c3e50;color:#fff;border-color:#2c3e50;}

/* TOTALES BANNER */
.totales-banner{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:.55rem .9rem;
}
.tot-label{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:.35rem;}
.tot-chips{display:flex;flex-wrap:wrap;gap:.3rem;}
.tot-chip{
  padding:.22rem .5rem;border-radius:2px;
  font-family:var(--mono);font-size:.72rem;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);white-space:nowrap;
}
.tot-chip b{color:var(--text);}
.tot-chip.cat-pollo{border-color:#1a5276;color:var(--c-pollo);}
.tot-chip.cat-cong{border-color:#0e6655;color:var(--c-cong);}
.tot-chip.cat-huevo{border-color:#784212;color:var(--c-huevo);}
.tot-chip.cat-var{border-color:#512e5f;color:var(--c-var);}
.tot-chip.cat-kg{border-color:#922b21;color:var(--c-kg);}

/* CONTENT */
#content{padding:.75rem .75rem 2rem;}

/* REPARTO SECTION */
.rep-section{margin-bottom:1.2rem;}
.rep-section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .6rem;margin-bottom:.5rem;
  border-left:3px solid currentColor;background:var(--surface);
}
.rep-section-name{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;font-weight:bold;}
.rep-section-count{font-family:var(--mono);font-size:.65rem;color:var(--text2);}
.color-ARIEL{color:#5dade2;} .color-GABRIEL{color:#af7ac5;} .color-MARTIN{color:#52be80;} .color-FEDERICO{color:#f0b27a;} .color-DEPOSITO{color:#85929e;}

/* MAPS REPARTO BTN */
.maps-recorrido{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem .7rem;margin-bottom:.55rem;
  background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.3);
  color:#5dade2;font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;
  text-decoration:none;border-radius:2px;
}
.maps-recorrido svg{flex-shrink:0;}

/* CARD CLIENTE */
.cli-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;margin-bottom:.55rem;overflow:hidden;
}
.cli-card-header{
  padding:.55rem .75rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.cli-nombre{font-size:.95rem;font-weight:600;letter-spacing:-.01em;}
.cli-kg-tag{
  flex-shrink:0;font-family:var(--mono);font-size:.6rem;
  padding:.15rem .4rem;border:1px solid var(--c-kg);color:var(--c-kg);border-radius:2px;
}
.cli-card-body{padding:.55rem .75rem;}

/* PRODUCTOS */
.prod-grupo{margin-bottom:.35rem;}
.prod-grupo-label{
  font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;
  margin-bottom:.2rem;
}
.prod-items-wrap{display:flex;flex-wrap:wrap;gap:.25rem;}
.prod-pill{
  padding:.18rem .45rem;border-radius:2px;
  font-family:var(--mono);font-size:.73rem;
  background:var(--surface2);border:1px solid var(--border);
  white-space:nowrap;
}
.prod-pill b{margin-right:.2rem;}
.prod-pill.cat-pollo{background:rgba(29,97,169,.18);border-color:#1d61a9;}
.prod-pill.cat-cong{background:rgba(14,102,85,.18);border-color:#0e6655;}
.prod-pill.cat-huevo{background:rgba(120,66,18,.18);border-color:#784212;}
.prod-pill.cat-var{background:rgba(81,46,95,.18);border-color:#512e5f;}
.prod-pill.cat-kg{background:rgba(146,43,33,.18);border-color:#922b21;}

/* OBS */
.cli-obs{
  margin-top:.4rem;padding:.35rem .5rem;
  background:rgba(231,76,60,.08);border-left:2px solid var(--accent);
  font-size:.75rem;color:#e59e97;font-style:italic;
}

/* DIRECCIÓN */
.cli-dir{
  margin-top:.4rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
}
.cli-dir-text{font-size:.75rem;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cli-maps-btn{
  flex-shrink:0;
  display:flex;align-items:center;gap:.25rem;
  padding:.28rem .65rem;
  background:rgba(52,152,219,.15);border:1px solid rgba(52,152,219,.4);
  color:#5dade2;font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;
  text-decoration:none;border-radius:2px;white-space:nowrap;
}

/* EMPTY / ERROR */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 1.5rem;text-align:center;gap:.75rem;
}
.empty-icon{font-size:2.5rem;opacity:.3;}
.empty-msg{font-size:.85rem;color:var(--text2);line-height:1.6;}
.empty-code{font-family:var(--mono);font-size:.72rem;color:var(--text2);background:var(--surface);padding:.5rem .75rem;border:1px solid var(--border);margin-top:.5rem;word-break:break-all;}

/* FOOTER */
.footer{
  text-align:center;padding:1rem;
  font-family:var(--mono);font-size:.6rem;color:var(--text2);
  letter-spacing:.06em;text-transform:uppercase;
  border-top:1px solid var(--border);margin-top:.5rem;
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">🚚</div>
  <div class="splash-title">Cargando reparto...</div>
  <div class="splash-bar"><div class="splash-progress" id="splashBar"></div></div>
</div>

<!-- HEADER -->
<div class="app-header" id="appHeader" style="display:none">
  <div class="header-left">
    <div class="header-title">Reparto del día</div>
    <div class="header-fecha" id="hFecha">—</div>
  </div>
  <div class="header-badge" id="hBadge">— pedidos</div>
</div>

<!-- FILTRO -->
<div class="filtro-wrap" id="filtroWrap" style="display:none"></div>

<!-- TOTALES -->
<div class="totales-banner" id="totalesBanner" style="display:none">
  <div class="tot-label" id="totLabel">Totales</div>
  <div class="tot-chips" id="totChips"></div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- FOOTER -->
<div class="footer" id="appFooter" style="display:none">Solo lectura · Gestor de Pedidos</div>

<script>
const CATEGORIAS=[
  {key:'pollo', label:'Pollo', cls:'cat-pollo', color:'#5dade2', prods:[
    {key:'pollo',label:'C/ Pollo'},{key:'x7',label:'C/ x7'},
    {key:'x8',label:'C/ x8'},{key:'x9',label:'C/ x9'}]},
  {key:'cong', label:'Congelados', cls:'cat-cong', color:'#58d68d', prods:[
    {key:'sup10',label:'C/ Sup x10'},{key:'interf',label:'C/ Interf'},
    {key:'fresca',label:'C/ Fresca'},{key:'sup15',label:'C/ Sup x15'},
    {key:'cuartos',label:'C/ 4tos'},{key:'pmd',label:'C/ PMD'}]},
  {key:'huevo', label:'Huevo', cls:'cat-huevo', color:'#f0b27a', prods:[
    {key:'extra',label:'C/ Extra'},{key:'bco1',label:'C/ Blanco N1'},
    {key:'bco2',label:'C/ Blanco N2'},{key:'color',label:'C/ Color'}]},
  {key:'var', label:'Variados', cls:'cat-var', color:'#c39bd3', prods:[
    {key:'tirita',label:'C/ Tirita'},{key:'mila',label:'C/ Mila'},
    {key:'patitas',label:'C/ Patitas'},{key:'medallon',label:'C/ Medallon'}]}
];
const KG_PRODS=[{key:'sup_kg',label:'Sup (kg)',cls:'cat-kg'},{key:'cuartos_kg',label:'4tos (kg)',cls:'cat-kg'}];
const ALL_KEYS=[];CATEGORIAS.forEach(c=>c.prods.forEach(p=>ALL_KEYS.push(p.key)));KG_PRODS.forEach(p=>ALL_KEYS.push(p.key));
const REPARTOS=['ARIEL','GABRIEL','MARTIN','FEDERICO','DEPOSITO'];

let pedidos=[], clientes=[], filtroActivo='TODOS', fecha='';

function fn(n){
  if(!n||n===0)return null;
  if(n===Math.floor(n))return String(n);
  if(Math.abs(n%1-.5)<.001)return `${Math.floor(n)}½`;
  return String(n);
}
function calcTot(ps){
  const t={};ALL_KEYS.forEach(k=>t[k]=0);
  ps.forEach(p=>ALL_KEYS.forEach(k=>t[k]+=(p.prod[k]||0)));
  return t;
}
function getCli(nombre){return clientes.find(c=>c.nombre===nombre)||null;}

async function parsearDatos(){
  const params=new URLSearchParams(window.location.search);
  const binId=params.get('bin');
  const key=params.get('k')||'';
  if(binId){
    const headers={};
    if(key) headers['X-Access-Key']=key;
    const res=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers});
    const json=await res.json();
    if(!res.ok) throw new Error('Error '+res.status+': '+(json.message||'Sin datos'));
    // JSONBin v3 devuelve los datos en json.record
    const raw=json.record||json;
    if(!raw.pedidos) throw new Error('Estructura inesperada: '+JSON.stringify(json).substring(0,150));
    pedidos=raw.pedidos||[];
    clientes=raw.clientes||[];
    fecha=raw.fecha||'';
    return true;
  }
  // Fallback: leer de URL ?d= (legacy)
  const d=params.get('d');
  if(!d) throw new Error('El link no contiene datos. Pedile al encargado que genere un nuevo link.');
  const raw=JSON.parse(decodeURIComponent(escape(atob(d))));
  pedidos=raw.pedidos||[];
  clientes=raw.clientes||[];
  fecha=raw.fecha||'';
  return true;
}

function formatFecha(f){
  if(!f)return '';
  const [yyyy,mm,dd]=f.split('-');
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const d=new Date(parseInt(yyyy),parseInt(mm)-1,parseInt(dd));
  return `${dias[d.getDay()]} ${parseInt(dd)} de ${meses[parseInt(mm)-1]}`;
}

function renderFiltros(){
  const wrap=document.getElementById('filtroWrap');
  const repartosConPedidos=REPARTOS.filter(r=>pedidos.some(p=>p.reparto===r));
  const items=['TODOS',...repartosConPedidos];
  wrap.innerHTML=items.map(r=>{
    const label=r==='TODOS'?'Todos':r;
    const cls=filtroActivo===r?(r==='TODOS'?'active':`active-${r}`):'';
    return `<button class="filtro-btn ${cls}" onclick="setFiltro('${r}')">${label}</button>`;
  }).join('');
  wrap.style.display='flex';
}

function setFiltro(r){
  filtroActivo=r;
  renderFiltros();
  renderTotales();
  renderContent();
}

function renderTotales(){
  const banner=document.getElementById('totalesBanner');
  const label=document.getElementById('totLabel');
  const chips=document.getElementById('totChips');
  const ps=filtroActivo==='TODOS'?pedidos:pedidos.filter(p=>p.reparto===filtroActivo);
  if(!ps.length){banner.style.display='none';return;}
  const tot=calcTot(ps);
  label.textContent=filtroActivo==='TODOS'?`Total general (${ps.length} pedidos)`:`Total ${filtroActivo} (${ps.length} pedidos)`;
  const html=[];
  CATEGORIAS.forEach(cat=>{
    cat.prods.forEach(p=>{
      const v=fn(tot[p.key]);
      if(v) html.push(`<span class="tot-chip ${cat.cls}"><b>${v}</b> ${p.label}</span>`);
    });
  });
  KG_PRODS.forEach(p=>{
    const v=fn(tot[p.key]);
    if(v) html.push(`<span class="tot-chip cat-kg"><b>${v}</b> ${p.label}</span>`);
  });
  if(!html.length){banner.style.display='none';return;}
  chips.innerHTML=html.join('');
  banner.style.display='block';
}

function buildMapsUrl(dirs, modo='recorrido'){
  if(!dirs.length)return null;
  if(dirs.length===1)return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dirs[0])}`;
  return `https://www.google.com/maps/dir/${dirs.map(d=>encodeURIComponent(d)).join('/')}`;
}

function renderContent(){
  const content=document.getElementById('content');
  const mostrarRepartos=filtroActivo==='TODOS'?REPARTOS:([filtroActivo]);
  const porR={};REPARTOS.forEach(r=>porR[r]=[]);
  pedidos.forEach(p=>{if(porR[p.reparto])porR[p.reparto].push(p);});

  let html='';
  let hayAlgo=false;

  mostrarRepartos.forEach(r=>{
    const ps=porR[r];if(!ps||!ps.length)return;
    hayAlgo=true;
    const colorClass=`color-${r}`;
    const dirs=ps.map(p=>{const c=getCli(p.cliente);return c&&c.dir?c.dir:'';}).filter(Boolean);
    const mapsUrl=dirs.length?buildMapsUrl(dirs):null;
    const sectionHeader=filtroActivo==='TODOS'?`
      <div class="rep-section-header ${colorClass}">
        <span class="rep-section-name">${r}</span>
        <span class="rep-section-count">${ps.length} entrega${ps.length>1?'s':''}</span>
      </div>`:'';
    const mapsBtn=mapsUrl?`
      <a href="${mapsUrl}" target="_blank" class="maps-recorrido">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Recorrido completo (${dirs.length} parada${dirs.length>1?'s':''})
      </a>`:'';

    const cards=ps.map(p=>{
      const cli=getCli(p.cliente);
      const isKg=cli&&cli.kg;
      const dir=cli&&cli.dir?cli.dir:'';
      const mapsCliUrl=dir?`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dir)}`:'';

      // Productos por categoria
      const grupos=CATEGORIAS.map(cat=>{
        const items=cat.prods.filter(pr=>{const v=fn(p.prod[pr.key]);return !!v;});
        if(!items.length)return '';
        const pills=items.map(pr=>`<span class="prod-pill ${cat.cls}"><b>${fn(p.prod[pr.key])}</b>${pr.label}</span>`).join('');
        return `<div class="prod-grupo"><div class="prod-grupo-label" style="color:${cat.color}">${cat.label}</div><div class="prod-items-wrap">${pills}</div></div>`;
      }).filter(Boolean).join('');

      const kgGrupo=KG_PRODS.filter(pr=>fn(p.prod[pr.key]));
      const kgHtml=kgGrupo.length?`<div class="prod-grupo"><div class="prod-grupo-label" style="color:var(--c-kg)">Por kg</div><div class="prod-items-wrap">${kgGrupo.map(pr=>`<span class="prod-pill cat-kg"><b>${fn(p.prod[pr.key])}</b>${pr.label}</span>`).join('')}</div></div>`:'';

      return `
        <div class="cli-card">
          <div class="cli-card-header">
            <span class="cli-nombre">${p.cliente}</span>
            ${isKg?'<span class="cli-kg-tag">kg</span>':''}
          </div>
          <div class="cli-card-body">
            ${grupos||kgHtml?grupos+kgHtml:'<span style="font-size:.75rem;color:var(--text2)">Sin productos</span>'}
            ${p.obs?`<div class="cli-obs">📝 ${p.obs}</div>`:''}
            ${dir?`<div class="cli-dir">
              <span class="cli-dir-text">📍 ${dir}</span>
              <a href="${mapsCliUrl}" target="_blank" class="cli-maps-btn">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Maps
              </a>
            </div>`:''}
          </div>
        </div>`;
    }).join('');

    html+=`<div class="rep-section">${sectionHeader}${mapsBtn}${cards}</div>`;
  });

  if(!hayAlgo){
    html=`<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-msg">No hay pedidos para mostrar en este reparto.</div>
    </div>`;
  }
  content.innerHTML=html;
}

function mostrarError(msg){
  document.getElementById('splash').classList.add('hide');
  document.getElementById('content').innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-msg">${msg}</div>
      <div class="empty-code">Este link es generado desde la app de gestión de pedidos.<br>Pedile al encargado que lo vuelva a compartir.</div>
    </div>`;
}

async function arrancar(){
  const bar=document.getElementById('splashBar');
  bar.style.width='40%';
  try{
    await parsearDatos();
    bar.style.width='100%';
    setTimeout(()=>{
      document.getElementById('splash').classList.add('hide');
      document.getElementById('hFecha').textContent=formatFecha(fecha);
      document.getElementById('hBadge').textContent=`${pedidos.length} pedido${pedidos.length!==1?'s':''}`;
      document.getElementById('appHeader').style.display='flex';
      document.getElementById('appFooter').style.display='block';
      renderFiltros();
      renderTotales();
      renderContent();
    },350);
  }catch(e){
    bar.style.width='100%';
    setTimeout(()=>{
      document.getElementById('splash').classList.add('hide');
      mostrarError(e.message);
    },350);
  }
}

arrancar();
</script>
</body>
</html>
